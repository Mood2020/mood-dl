name: 🎬 YouTube Ultimate Downloader (Pro Version)

on:
  workflow_dispatch:
    inputs:
      video_urls:
        description: '📥 لینک ویدیوها (چند لینک را با فاصله از هم جدا کنید)'
        required: true
        type: string
      quality:
        description: '🚀 انتخاب کیفیت ویدیو'
        required: true
        default: 'best'
        type: choice
        options:
          - 'best'
          - '1080'
          - '720'
          - '480'
          - 'audio_mp3'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  download-youtube:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git Settings
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Start Cloudflare WARP (Bypass Blocks)
        run: |
          echo "Starting WARP..."
          docker network create warp-net || true
          docker run -d --name warp --restart=always --network warp-net -p 1080:1080 --cap-add NET_ADMIN --sysctl net.ipv6.conf.all.disable_ipv6=0 --sysctl net.ipv4.conf.all.src_valid_mark=1 -v warp-data:/var/lib/cloudflare-warp caomingjun/warp
          sleep 15

      - name: Install Advanced Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-pip zip curl jq bc
          curl -fsSL https://deno.land/install.sh | sh
          export DENO_INSTALL="$HOME/.deno"
          echo "$DENO_INSTALL/bin" >> $GITHUB_PATH
          pip3 install --upgrade yt-dlp

      - name: Core Downloader Process
        env:
          YT_URLS: ${{ github.event.inputs.video_urls }}
        run: |
          # اطمینان از دسترسی کامل ابزار دانلود به FFmpeg سیستم برای چسباندن صدا به تصویر
          export PATH=$PATH:/usr/bin/ffmpeg
          
          if [ "${{ github.event.inputs.quality }}" == "audio_mp3" ]; then
            FORMAT="bestaudio/best"
          elif [ "${{ github.event.inputs.quality }}" == "best" ]; then
            FORMAT="bestvideo+bestaudio/best"
          else
            FORMAT="bestvideo[height<=${{ github.event.inputs.quality }}]+bestaudio/best[height<=${{ github.event.inputs.quality }}]"
          fi

          read -ra URL_LIST <<< "$YT_URLS"
          
          # ساخت مستقیم پوشه دانلود در محیط لوکال پروژه برای رفع مشکل فولدربندی
          mkdir -p videos

          sanitize_name() {
            echo "$1" | sed 's/[^a-zA-Z0-9آ-یضصثقفغعهخحجچپگکمنتلبیسشظطزرذددوؤئءأإ ]/-/g' | sed 's/ /-/g' | tr -s '-'
          }

          for URL in "${URL_LIST[@]}"; do
            echo "Processing URL: $URL"
            
            VIDEO_INFO=""
            for i in {1..3}; do
              VIDEO_INFO=$(yt-dlp --proxy "socks5://127.0.0.1:1080" --dump-json "$URL" 2>/dev/null || echo "")
              if [ -n "$VIDEO_INFO" ]; then
                break
              fi
              echo "Retry $i: Failed to fetch info. Waiting..."
              sleep 5
            done

            if [ -z "$VIDEO_INFO" ]; then
              echo "Failed to fetch video info for $URL. Skipping..."
              continue
            fi

            TITLE_RAW=$(echo "$VIDEO_INFO" | jq -r '.title')
            DURATION_SEC=$(echo "$VIDEO_INFO" | jq -r '.duration')
            DURATION_MIN=$(echo "scale=2; $DURATION_SEC / 60" | bc)
            
            FOLDER_NAME=$(sanitize_name "$TITLE_RAW")
            TARGET_FOLDER="videos/$FOLDER_NAME"
            mkdir -p "$TARGET_FOLDER"

            # دانلود تامبنیل
            yt-dlp --proxy "socks5://127.0.0.1:1080" --write-thumbnail --skip-download -o "$TARGET_FOLDER/thumbnail.%(ext)s" "$URL" || true
            mv "$TARGET_FOLDER"/thumbnail.* "$TARGET_FOLDER/thumbnail.jpg" 2>/dev/null || true

            # دانلود ویدیو با فرمت ادغامیِ ویدیو + صدا به کمک FFmpeg
            COMMON_FLAGS="--proxy socks5://127.0.0.1:1080 --merge-output-format mp4 --ffmpeg-location /usr/bin/ffmpeg --no-cache-dir --no-part --no-playlist --retries 5 --js-runtimes deno --remote-components ejs:github --user-agent 'Mozilla/5.0' -o $TARGET_FOLDER/video.%(ext)s"
            
            if [ "${{ github.event.inputs.quality }}" == "audio_mp3" ]; then
              yt-dlp $COMMON_FLAGS -f "$FORMAT" -x --audio-format mp3 "$URL"
            else
              yt-dlp $COMMON_FLAGS -f "$FORMAT" "$URL"
            fi

            DOWNLOADED_FILE=$(find "$TARGET_FOLDER" -type f ! -name "thumbnail.jpg" ! -name "README.md" | head -n 1)
            
            if [ -n "$DOWNLOADED_FILE" ]; then
              SIZE_BYTES=$(stat -c%s "$DOWNLOADED_FILE")
              SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1024 / 1024" | bc)
              
              echo "# 🎬 مشخصات و لینک دانلود ویدیو" > "$TARGET_FOLDER/README.md"
              echo "" >> "$TARGET_FOLDER/README.md"
              echo "<div align=\"center\">" >> "$TARGET_FOLDER/README.md"
              echo "  <img src=\"thumbnail.jpg\" width=\"400\" alt=\"Thumbnail\">" >> "$TARGET_FOLDER/README.md"
              echo "</div>" >> "$TARGET_FOLDER/README.md"
              echo "" >> "$TARGET_FOLDER/README.md"
              echo "---" >> "$TARGET_FOLDER/README.md"
              echo "" >> "$TARGET_FOLDER/README.md"
              echo "| مشخصات | مقادیر |" >> "$TARGET_FOLDER/README.md"
              echo "| :--- | :--- |" >> "$TARGET_FOLDER/README.md"
              echo "| **تایتل اصلی** | $TITLE_RAW |" >> "$TARGET_FOLDER/README.md"
              echo "| **لینک یوتیوب** | [مشاهده در یوتیوب]($URL) |" >> "$TARGET_FOLDER/README.md"
              echo "| **مدت زمان** | $DURATION_MIN دقیقه |" >> "$TARGET_FOLDER/README.md"
              echo "| **حجم دقیق فایل** | $SIZE_MB مگابایت |" >> "$TARGET_FOLDER/README.md"
              echo "" >> "$TARGET_FOLDER/README.md"
              echo "---" >> "$TARGET_FOLDER/README.md"

              SPLIT_LIMIT=$(( 45 * 1024 * 1024 ))
              if [ "$SIZE_BYTES" -gt "$SPLIT_LIMIT" ]; then
                echo "File is larger than 45MB ($SIZE_MB MB). Splitting into zip parts..."
                cd "$TARGET_FOLDER"
                zip -0 -s 45m "Video_Parts.zip" "$(basename "$DOWNLOADED_FILE")"
                rm "$(basename "$DOWNLOADED_FILE")"
                cd -
                echo "" >> "$TARGET_FOLDER/README.md"
                echo "### 📦 فایل‌های پارت‌بندی شده (حجم بالای ۴۵ مگابایت):" >> "$TARGET_FOLDER/README.md"
                echo "لطفاً تمام پارت‌ها را دانلود کرده و فقط فایل \`Video_Parts.zip\` را اکسترکت کنید." >> "$TARGET_FOLDER/README.md"
              fi
            fi
          done

      - name: Stop Cloudflare WARP
        if: always()
        run: docker stop warp && docker rm warp || true

      - name: Commit Files to GitHub Repository
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git fetch origin "$BRANCH"
          git reset --hard origin/"$BRANCH"
          
          if [ -d "videos" ]; then
            git add videos/
            if ! git diff --cached --quiet; then
              git commit -m "🎬 Fix audio sync and strict folder mapping [skip ci]"
              FOR_RETRY=0
              while [ $FOR_RETRY -lt 5 ]; do
                FOR_RETRY=$((FOR_RETRY + 1))
                if git push origin HEAD:"$BRANCH"; then
                  echo "Successfully saved everything to your repository!"
                  break
                fi
                sleep 5
                git fetch origin "$BRANCH"
                git rebase origin/"$BRANCH"
              done
            fi
          fi
