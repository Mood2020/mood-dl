name: 🎬 YouTube Pro Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک ویدیو (YouTube)'
        required: true
        type: string
      quality:
        description: 'کیفیت دانلود'
        required: true
        default: 'best'
        type: choice
        options:
          - 'best'
          - '720'
          - '480'
          - 'audio'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Environment
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          sudo apt-get install -y zip
      
      - name: Download Content
        run: |
          mkdir -p raw_dl chunks
          cd raw_dl
          if [ "${{ inputs.quality }}" == "audio" ]; then
            yt-dlp -f "bestaudio" -x --audio-format mp3 "${{ inputs.url }}" -o "media.%(ext)s"
          elif [ "${{ inputs.quality }}" == "best" ]; then
            yt-dlp -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" "${{ inputs.url }}" -o "media.%(ext)s"
          else
            yt-dlp -f "bestvideo[height<=${{ inputs.quality }}][ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" "${{ inputs.url }}" -o "media.%(ext)s"
          fi
      
      - name: Split and Zip (45MB chunks)
        run: zip -s 45m -j chunks/Media.zip raw_dl/*
          
      - name: Upload to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: YouTube-Download-${{ inputs.quality }}
          path: chunks/
